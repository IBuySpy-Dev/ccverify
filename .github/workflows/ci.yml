name: CCVerify CI

on:
  push:
    branches: [master, "feat/**"]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore CCVerify.sln

      - name: Build
        run: dotnet build CCVerify.sln -c Release --no-restore

      - name: Test
        run: dotnet test CCVerify.sln -c Release --no-build --verbosity normal
